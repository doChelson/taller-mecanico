name: Desplegar AutoFix a Azure

# Se ejecuta cada vez que haces push a la rama main
on:
  push:
    branches:
      - main
  workflow_dispatch:   # también permite lanzarlo a mano desde GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Descargar el código del repo
      - name: Descargar el código
        uses: actions/checkout@v4

      # 2) Compilar el frontend (React + Vite)
      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compilar el frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # 3) Meter el frontend compilado dentro del backend
      - name: Copiar el frontend dentro del backend
        run: |
          mkdir -p backend/src/main/resources/static
          cp -r frontend/dist/* backend/src/main/resources/static/

      # 4) Compilar el backend (Spring Boot) y generar el .jar
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Empaquetar el backend
        working-directory: backend
        run: mvn -B package -DskipTests

      # 5) Subir el .jar a Azure App Service
      - name: Desplegar a Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: autofix-web-mv2026
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/target/*.jar
