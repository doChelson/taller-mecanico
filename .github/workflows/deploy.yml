name: Construir y desplegar AutoFix a Azure

# Se ejecuta en cada push a main (auto-despliegue)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Iniciar sesión en el registro (ACR)
        uses: docker/login-action@v3
        with:
          registry: autofixacrmv2026.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Construir la imagen (front + back + Java 17) y subirla
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: autofixacrmv2026.azurecr.io/autofix:latest
